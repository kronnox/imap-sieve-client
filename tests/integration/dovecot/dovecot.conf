protocols = imap
listen = *
disable_plaintext_auth = no
ssl = no

mail_location = maildir:/srv/mail/%u

passdb {
  driver = passwd-file
  args = scheme=PLAIN /etc/dovecot/users
}
userdb {
  driver = passwd-file
  args = /etc/dovecot/users
  default_fields = uid=1000 gid=1000 home=/srv/mail/%u
}

namespace inbox {
  inbox = yes
}